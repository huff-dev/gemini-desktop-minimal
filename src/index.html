<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Gemini</title>
    <link rel="icon" href="../assets/App_icon.png" type="image/png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
      <header class="titlebar">
        <div class="nav-buttons hidden">
          <button id="back" class="nav-btn">
            <svg viewBox="0 0 24 24">
              <path d="M6 12h12M6 12l5-5m-5 5 5 5" />
            </svg>
          </button>

          <!-- <button id="forward" class="nav-btn">
            <svg viewBox="0 0 24 24">
              <path d="M6 12h12m0 0-5-5m5 5-5 5" />
            </svg>
          </button> -->
        </div>

        <div id="update-container" class="update-container">
          <div id="update-spinner" class="spinner" title="Checking for updates...">
            <svg viewBox="0 0 24 24" class="minimal-spinner">
              <path d="M12 4a8 8 0 0 1 8 8" />
            </svg>
          </div>
          <button id="update-btn" class="update-btn" title="Update Available">
            Update
          </button>
        </div>

        <div id="window-controls">
          <button id="minimize">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M5 12h14" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </button>

          <button id="close">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M6 6l12 12M6 18L18 6" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </header>
      
      <div id="loading-screen">
        <img src="../assets/Google_Gemini_icon.svg" id="loading-icon" alt="Loading..." />
      </div>
      <webview id="webview" src="https://gemini.google.com/app" preload="./webview-preload.js"></webview>
    <script src="./renderer.js"></script>
  </body>
</html>
